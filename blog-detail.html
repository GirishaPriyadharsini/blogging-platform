<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Platform - Blog Detail</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <nav>
            <a href="/" class="logo">BlogSpace</a>
            <div class="nav-links">
                <!-- Navigation will be updated by JavaScript -->
            </div>
        </nav>
    </header>
    
    <main>
        <div class="blog-detail">
            <!-- Blog content will be loaded by JavaScript -->
        </div>
        
        <div class="comments-section">
            <h2>Comments</h2>
            <div class="comment-form">
                <!-- Comment form will be loaded by JavaScript -->
            </div>
            <div class="comments-list">
                <!-- Comments will be loaded by JavaScript -->
            </div>
        </div>
    </main>
    
    <script src="js/script.js"></script>
</body>
</html>
