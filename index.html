<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Platform - Home</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <nav>
            <a href="/" class="logo">BlogSpace</a>
            <div class="nav-links">
                <!-- Navigation will be updated by JavaScript -->
            </div>
        </nav>
    </header>
    
    <main>
        <section class="hero">
            <h1>Share Your Stories</h1>
            <p>A platform for writers to express, connect, and inspire</p>
            <a href="#blogs" class="btn btn-primary">Explore Blogs</a>
        </section>
        
        <section id="blogs">
            <h2>Latest Blogs</h2>
            <div class="blog-grid">
                <!-- Blogs will be loaded by JavaScript -->
            </div>
        </section>
    </main>
    
    <script src="js/script.js"></script>
</body>
</html>
