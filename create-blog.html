<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Platform - Create Blog</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <nav>
            <a href="/" class="logo">BlogSpace</a>
            <div class="nav-links">
                <!-- Navigation will be updated by JavaScript -->
            </div>
        </nav>
    </header>
    
    <main>
        <div class="form-container">
            <h2 class="text-center">Create New Blog</h2>
            <form id="blogForm" enctype="multipart/form-data">
                <div class="form-group">
                    <label for="title">Title</label>
                    <input type="text" id="title" name="title" required>
                </div>
                <div class="form-group">
                    <label for="content">Content</label>
                    <textarea id="content" name="content" rows="10" required></textarea>
                </div>
                <div class="form-group">
                    <label for="image">Featured Image (optional)</label>
                    <input type="file" id="image" name="image" accept="image/*">
                </div>
                <button type="button" class="btn btn-primary btn-block" onclick="handleCreateBlog()">Create Blog</button>
            </form>
        </div>
    </main>
    
    <script>
        // Check if user is logged in
        const token = localStorage.getItem('token');
        
        if (!token) {
            window.location.href = 'login.html';
        }

        async function handleCreateBlog() {
            const title = document.getElementById('title').value;
            const content = document.getElementById('content').value;
            const imageInput = document.getElementById('image');
            
            if (!title || !content) {
                alert('Please fill in all required fields');
                return;
            }
            
            const formData = new FormData();
            formData.append('title', title);
            formData.append('content', content);
            
            if (imageInput.files[0]) {
                formData.append('image', imageInput.files[0]);
            }
            
            try {
                const response = await fetch('/api/blogs', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    },
                    body: formData
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    alert('Blog created successfully!');
                    window.location.href = '/';
                } else {
                    alert('Error: ' + data.error);
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Failed to create blog. Please try again.');
            }
        }
    </script>
</body>
</html>
